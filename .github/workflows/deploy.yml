name: CICD for Java Spring Boot with Docker Hub

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout mã nguồn từ repository
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Thiết lập JDK 17
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'

    # 3. Build tệp Jar bằng Maven
    - name: Build with Maven
      run: mvn -f demo/pom.xml clean package -DskipTests

    # 4. Đăng nhập vào Docker Hub sử dụng Secrets
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # 5. Build và Push Docker Image lên Docker Hub
    - name: Build and Push Docker image
      uses: docker/build-push-action@v5
      with:
        context: ./demo
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/demo:latest
